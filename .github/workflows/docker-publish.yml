name: Build & Publish Docker Image

# Manual trigger only — the primary build runs as part of release-please.yml.
# Use this to rebuild a specific version tag if needed.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. v4.0.1)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Get build info
        id: build_info
        run: |
          echo "sha=$(git log --first-parent --skip=1 -1 --pretty=format:%h)" >> $GITHUB_OUTPUT
          echo "msg=$(git log --first-parent --skip=1 -1 --pretty=format:%s)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }}
            type=semver,pattern={{major}},value=${{ inputs.tag }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ inputs.tag }}
            COMMIT_SHA=${{ steps.build_info.outputs.sha }}
            COMMIT_MSG=${{ steps.build_info.outputs.msg }}
